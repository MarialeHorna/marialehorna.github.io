# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                    : "Marialexandra Horna"
title_separator          : "|"
name                     : &name "Marialexandra Horna"
description              : &description "Climate finance and development economist working at the intersection of capital, policy, and emerging markets."
url                      : https://marialehorna.github.io
baseurl                  : ""
repository               : "MarialeHorna/marialehorna.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
# If a field is blank the icon and link will not appear, otherwise it will be shown.
# Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar                 : "profile.jpg"
  name                   : "Marialexandra Horna"
  pronouns               : "she/her"
  bio                    : "MSc in Climate Finance candidate at Columbia Climate School. Climate Investment Associate at IDB Lab. Working across climate finance, development, and emerging-markets policy in Latin America."
  location               : "New York / Lima"
  employer               : "Columbia Climate School · IDB Lab"
  uri                    : "https://marialehorna.github.io"
  email                  : "mh4850@columbia.edu"

  # Academic websites
  academia               :
  arxiv                  :
  googlescholar          :
  inspire-hep            :
  impactstory            :
  orcid                  :
  semantic               :
  ssrn                   :
  pubmed                 :
  researchgate           :
  scopus                 :
  zotero                 :

  # Repositories and software development
  bitbucket              :
  codepen                :
  dribbble               :
  github                 : "MarialeHorna"
  kaggle                 :
  stackoverflow          :

  # Social media
  artstation             :
  bluesky                :
  facebook               :
  flickr                 :
  foursquare             :
  goodreads              :
  google_plus            :
  keybase                :
  instagram              :
  lastfm                 :
  linkedin               : "alehorna"
  mastodon               :
  medium                 :
  pinterest              :
  soundcloud             :
  steam                  :
  telegram               :
  tumblr                 :
  twitter                :
  vine                   :
  weibo                  :
  wikipedia              :
  xing                   :
  youtube                :
  zhihu                  :

# Publication Category - The following the list of publication categories and their headings
publication_category:
  manuscripts:
    title: 'Peer-Reviewed Publications'
  essays:
    title: 'Essays & Commentary'
  briefs:
    title: 'Policy Briefs & Reports'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               :
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :
  staticman:
    allowedFields        : ['name', 'email', 'url', 'message']
    branch               : "gh-pages"
    commitMessage        : "New comment."
    filename             : comment-{@timestamp}
    format               : "yml"
    moderation           : true
    path                 : "_data/comments/{options.slug}"
    requiredFields       : ['name', 'email', 'message']
    transforms:
      email              : "md5"
    generatedFields:
      date:
        type             : "date"
        options:
          format         : "iso8601"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/New_York


# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji


# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development


# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true


# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
