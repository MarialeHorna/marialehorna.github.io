# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                    : "Marialexandra Horna"
title_separator          : "|"
name                     : &name "Marialexandra Horna"
description              : &description "Climate finance and development economist working at the intersection of capital, policy, and emerging markets."
url                      : https://marialehorna.github.io
baseurl                  : ""
repository               : "MarialeHorna/marialehorna.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
# If a field is blank the icon and link will not appear, otherwise it will be shown.
# Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar                 : "profile.jpg"
  name                   : "Marialexandra Horna"
  pronouns               : "she/her"
  bio                    : "MSc in Climate Finance candidate at Columbia Climate School. Climate Investment Associate at IDB Lab. Working across climate finance, development, and emerging-markets policy in Latin America."
  location               : "New York / Lima"
  employer               : "Columbia Climate School · IDB Lab"
  uri                    : "https://marialehorna.github.io"
  email                  : "mh4850@columbia.edu"

  # Acade
