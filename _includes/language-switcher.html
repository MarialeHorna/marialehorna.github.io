{% comment %}
Language switcher: shows EN | ES toggle inline using flexbox wrapper.
{% endcomment %}

{% assign is_spanish = false %}
{% if page.url contains '/es/' %}
  {% assign is_spanish = true %}
{% endif %}

<li class="masthead__menu-item persist">
  <span style="display: inline-flex; align-items: center; gap: 0.3em; font-size: 0.85em; letter-spacing: 0.05em; white-space: nowrap;">
    {% if is_spanish %}
      <a href="{{ base_path }}/" title="Switch to English" style="text-decoration: none;">EN</a>
      <span style="opacity: 0.5;">|</span>
      <span style="font-weight: 700;">ES</span>
    {% else %}
      <span style="font-weight: 700;">EN</span>
      <span style="opacity: 0.5;">|</span>
      <a href="{{ base_path }}/es/" title="Cambiar a español" style="text-decoration: none;">ES</a>
    {% endif %}
  </span>
</li>
